name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          # Find the project automatically
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME="ios-webview-experimental-v2"
          
          # This command builds the app and IGNORES all security/signing errors
          xcodebuild build -project "$PROJECT_PATH" \
          -scheme "$SCHEME_NAME" \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          COMPILER_INDEX_STORE_ENABLE=NO
          
          # Move the app into a folder and zip it
          mkdir -p Payload
          # Search for the built app in the hidden build folder
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r YourApp.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: My-iOS-App
          path: YourApp.ipa
