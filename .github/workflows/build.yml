name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild -project ios-webview-experimental-v2/ios-webview-experimental-v2.xcodeproj \
          -scheme "ios-webview-experimental-v2" \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
          
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/
          zip -r YourApp.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: My-iOS-App
          path: YourApp.ipa
